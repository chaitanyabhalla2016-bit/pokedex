<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pokémon - Gotta Catch 'Em All!</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./css/styles.css">
    <link rel="shortcut icon" href="./images/Pokeball_icon.png" type="image/x-icon">
  </head>
  <body>
    <header class="container-fluid bg-electric-gradient">
        <div class="container">
            <div class="header-content d-flex justify-content-center flex-column align-items-center p-2">
                <h1 class="h2 text-pikachu-header">Pokedex</h1>
            </div>
        </div>
    </header>
    <section class="container-fluid">
        <div class="container">
            <div class="form-content p-4">
                <form>
                    <div class="row mb-3">
                        <div class="col">
                            <input type="text" class="form-control" id="pName" placeholder="Pokemon Name">
                        </div>
                        <div class="col">
                            <input type="text" class="form-control" id="pType" placeholder="Pokemon Type">
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col">
                            <input type="text" class="form-control" id="pSpecies" placeholder="Pokemon Species">
                        </div>
                        <div class="col">
                            <input type="text" class="form-control" id="pColor" placeholder="Pokemon Color">
                        </div>
                    </div>
                    <div class="row mb-3">
                        <label for="pImage" class="col-sm-2 col-form-label">Pokemon Image URL</label>
                        <div class="col-sm-10">
                        <input type="text" class="form-control" id="pImage">
                        </div>
                    </div>
                    <button type="button" class="btn btn-primary add-poke-btn">Gotta Catch'em All</button>
                </form>
            </div>
        </div>
    </section>
    <section class="container-fluid">
        <div class="container">
            <div class="row pokemon-content p-2">

            </div>
        </div>
    </section>
    <footer class="container-fluid fixed-bottom bg-info-subtle">
        <div class="container">
            <div class="footer-content p-2 d-flex justify-content-center align-items-center">
                <p class="lead text-center text-info-emphasis fw-medium m-0">©BCV,&nbsp;<span class="year"></span></p>
            </div>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script type="module" src="./js/app.js"></script>
  </body>
</html>
