<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    <header class="container-fluid bg-warning">
        <div class="container">
            <div class="header-content d-flex justify-content-center flex-column align-items-center p-2">
                <h1>Pokedex</h1>
            </div>
        </div>
    </header>
    <section class="container-fluid">
        <div class="container">
            <div class="form-content p-4">
                <form>
                    <div class="row mb-3">
                        <label for="pName" class="col-sm-2 col-form-label">Pokemon Name</label>
                        <div class="col-sm-10">
                        <input type="text" class="form-control" id="pName">
                        </div>
                    </div>
                    <div class="row mb-3">
                        <label for="pType" class="col-sm-2 col-form-label">Pokemon Type</label>
                        <div class="col-sm-10">
                        <input type="text" class="form-control" id="pType">
                        </div>
                    </div>
                    <button type="button" class="btn btn-primary add-pokemon-btn">Gotta Catch'em All</button>
                </form>
            </div>
        </div>
    </section>
    <section class="container-fluid">
        <div class="container">
            <div class="row pokemon-content p-2">

            </div>
        </div>
    </section>
    <footer class="container-fluid">
        <div class="container">
            <div class="footer-content d-flex justify-content-center align-items-center p-4">
                <p class="small">©BCV,&nbsp;<span class="year"></span></p>
            </div>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="./js/app.js"></script>
  </body>
</html>
